site_name: GR712RC / GR740 QEMU Emulator
site_description: >-
  QEMU emulation of Cobham Gaisler GR712RC (LEON3FT) and GR740 (LEON4) SoCs,
  targeting RTEMS 5 applications built with the RCC toolchain.
site_url: https://nhorro.github.io/gr712rc-emulator-qemu/
repo_url: https://github.com/nhorro/gr712rc-emulator-qemu
repo_name: nhorro/gr712rc-emulator-qemu
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2025–2026 Nicolás Horro

docs_dir: docs

# README.md is the landing page for the docs/ folder when browsed on GitHub.
# index.md is the landing page for the rendered MkDocs site. Skip the README
# in the build to avoid duplicate "Home" entries.
exclude_docs: |
  README.md

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nhorro/gr712rc-emulator-qemu

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Architecture & internals:
      - QEMU primer: 01-qemu-primer.md
      - Code map: 02-code-map.md
      - Adding a peripheral: 03-adding-a-peripheral.md
      - Debugging: 04-debugging.md
      - Contributing: 05-contributing.md
  - Interfaces:
      - UART socket interface: 06-uart-socket-interface.md
      - Adapter API: 07-adapter-api.md
      - Running the service: 08-running-the-service.md
      - Portable export: 09-portable-export.md
      - Embedding as library: 11-embedding-as-library.md
  - Hardware reference:
      - GR740 IP cores: 10-gr740-ipcores.md
