# GR712RC / GR740 emulator + adapter service.
#
# Usage:
#   docker compose up --build
#
# Then upload an ELF and drive the session over HTTP/WebSocket. See
# docs/07-adapter-api.md for the full protocol and docs/08-running-the-
# service.md for a worked walkthrough.

services:
  emulator:
    build:
      context: .
      dockerfile: Dockerfile
    image: qemu-gr712rc-emulator:latest
    container_name: qemu-gr712rc-emulator
    ports:
      - "8080:8080"
      # SpaceWire peer-side listeners (one per GRSPW2 link). The
      # service binds 5101+i for spw{i}; only `gr712rc` exposes spw0
      # in this release, but the range is published up front so future
      # spw1..spw5 work without recomposing the container. Override the
      # base via SPW_PEER_PORT_BASE if 5101 conflicts with another tool.
      - "5101-5106:5101-5106"
    # Uploads live in a tmpfs so they're wiped on restart, matching the
    # spec's "ephemeral uploads" contract. Sized at 64 MiB so the 32 MiB
    # per-file limit is never the bottleneck.
    tmpfs:
      - /var/uploads:size=64m
    # Bind-mount ui/ over the image's bundled copy. Lets you edit JSX
    # and hard-refresh the browser without rebuilding the image. Comment
    # out for production deployments where the baked-in copy should win.
    volumes:
      - ./ui:/opt/ui:ro
    # QEMU_BINARY chooses the emulator backend:
    #   qemu-system-sparc        (default) standalone QEMU subprocess.
    #   qemu-system-sparc-embed  the embedding-SDK wrapper that links
    #                            libqemu-sparc.so in-process; adds a
    #                            host-info peripheral at 0x80000a00
    #                            (gr712rc) or 0xff900a00 (gr740) for
    #                            visual confirmation. See docs/12.
    # Both binaries are baked into the image; flip without rebuilding.
    environment:
      QEMU_BINARY: ${QEMU_BINARY:-qemu-system-sparc}
    restart: unless-stopped
